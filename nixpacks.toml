# Configuração Nixpacks para Railway
# Node 24 é instalado automaticamente pelo provider Node, lendo "engines" do package.json.
# Aqui só adicionamos as dependências de sistema (ffmpeg, yt-dlp, python).

[phases.setup]
aptPkgs = ["ffmpeg", "python3", "python3-pip"]
nixPkgs = ["yt-dlp"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@10.26.1 --activate",
  "pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = ["pnpm --filter @workspace/api-server... run build"]

[start]
cmd = "pnpm --filter @workspace/api-server run start"
