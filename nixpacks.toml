# Configuração Nixpacks para Railway
# Node 24 vem do provider Node (lê "engines" do package.json).
# pnpm é instalado via npm global pra evitar problema de PATH com corepack.

[phases.setup]
aptPkgs = ["ffmpeg", "python3", "python3-pip"]
nixPkgs = ["yt-dlp"]

[phases.install]
cmds = [
  "npm install -g pnpm@10.26.1",
  "pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = ["pnpm --filter @workspace/api-server... run build"]

[start]
cmd = "pnpm --filter @workspace/api-server run start"
