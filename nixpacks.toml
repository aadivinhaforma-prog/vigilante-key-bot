# Bot Discord Vigilante Key - Configuração de Deploy no Railway
# Este arquivo configura como o Railway vai instalar e rodar o bot
# Não mexa aqui a menos que saiba o que está fazendo!

[phases.setup]
# Instala o Node.js 22, pnpm, ffmpeg (para áudio) e yt-dlp (para vídeos)
nixPkgs = ["nodejs_22", "pnpm", "ffmpeg-full", "yt-dlp", "python3"]

[phases.install]
# Instala as dependências do projeto
cmds = ["pnpm install"]

[phases.build]
# Compila o código TypeScript
cmds = ["pnpm run build"]

[start]
# Inicia o servidor do bot
cmd = "pnpm --filter @workspace/api-server run start"
